<!DOCTYPE html>
<html>
<head>
    <title>Experiment 4 - HTML Lists</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0a192f;
            color: #e6edf3;
        }

        h1 {
            text-align: center;
            color: #64ffda;
            margin-top: 30px;
            font-size: 36px;
            letter-spacing: 1px;
        }

        h2 {
            color: #ccd6f6;
            border-left: 4px solid #64ffda;
            padding-left: 10px;
            margin-top: 30px;
        }
        .container {
            width: 70%;
            margin: 40px auto;
            background: #112240;
            padding: 25px 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

 
        ol {
            padding-left: 25px;
        }

        ol li {
            margin: 10px 0;
            padding: 10px;
            background: #0f2a44;
            border-radius: 6px;
            transition: 0.3s;
        }

  
        ul {
            padding-left: 25px;
        }

        ul li {
            margin: 10px 0;
            padding: 10px;
            background: #0f2a44;
            border-radius: 6px;
            list-style-type: square;
            transition: 0.3s;
        }

   
        dl {
            margin-top: 15px;
        }

        dt {
            font-weight: bold;
            color: #64ffda;
            margin-top: 12px;
        }

        dd {
            margin-left: 20px;
            margin-bottom: 10px;
            color: #8892b0;
        }

  
        li:hover {
            background: #64ffda;
            color: #0a192f;
            transform: translateX(5px);
            cursor: pointer;
        }
    </style>

</head>

<body>

    <h1>HTML List Tags</h1>

    <div class="container">

        <h2>Ordered List</h2>
        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ol>

        <h2>Unordered List</h2>
        <ul>
            <li>Java</li>
            <li>Python</li>
            <li>C++</li>
        </ul>

        <h2>Description List</h2>
        <dl>
            <dt>HTML</dt>
            <dd>Used to create web pages</dd>

            <dt>CSS</dt>
            <dd>Used to style web pages</dd>

            <dt>JavaScript</dt>
            <dd>Used to make web pages interactive</dd>
        </dl>

    </div>

</body>
</html>
